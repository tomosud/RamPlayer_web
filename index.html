<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RamPlayer Web</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1>RamPlayer Web</h1>
        <div id="filename" class="filename">No file selected</div>
      </header>

      <div id="stage" class="stage">
        <canvas id="canvas"></canvas>
        <div id="dropHint" class="drop-hint">
          <p>Drop a media file here</p>
          <p class="sub">MP4 / MOV / WebM with WebCodecs-compatible codecs</p>
        </div>
        <button id="resumeBtn" class="resume-btn" hidden>Reopen previous file</button>
      </div>

      <div id="error" class="error" hidden></div>
      <div id="timelinePreview" class="timeline-preview" hidden>
        <canvas id="timelinePreviewCanvas"></canvas>
        <span id="timelinePreviewTime">00:00.000</span>
      </div>

      <button id="showUiBtn" class="show-ui-btn" hidden>Controls ▲</button>

      <section id="floatingUi" class="floating-ui" aria-label="Player controls">
        <div class="timeline-wrap">
          <canvas id="timeline" class="timeline"></canvas>
        </div>

        <div class="filmstrip-wrap">
          <canvas id="filmstrip" class="filmstrip"></canvas>
        </div>

        <div class="info-row">
          <div class="time-cluster">
            <span id="curTime">00:00.000</span>
            <span class="sep">/</span>
            <span id="totalTime">00:00.000</span>
            <span id="timecodeLabel" class="metric">TC 00:00:00:00</span>
            <span id="frameLabel" class="metric">Frame 0 / 0</span>
            <span id="inOutLabel" class="inout-label"></span>
          </div>
          <span id="mediaInfo" class="media-info"></span>
          <span id="memUsage" class="mem-usage"></span>
        </div>

        <div class="controls">
          <button id="prevFrame" title="Previous frame (Left)">Prev</button>
          <button id="playPause" title="Play / Pause (Space)">Play</button>
          <button id="nextFrame" title="Next frame (Right)">Next</button>

          <span class="spacer"></span>

          <button id="setIn" title="Set In at current time (I)">Set In</button>
          <button id="setOut" title="Set Out at current time (O)">Set Out</button>
          <button id="clearInOut" title="Clear In/Out">Clear In/Out</button>
          <button id="loopBtn" title="Loop on/off (L)">Loop: OFF</button>

          <span class="spacer"></span>

          <label class="zoom-select">
            Scale
            <select id="viewScale">
              <option value="fit">Fit</option>
              <option value="0.1">10%</option>
              <option value="0.25">25%</option>
              <option value="0.5">50%</option>
              <option value="1">100%</option>
              <option value="custom" disabled>Custom</option>
            </select>
          </label>
          <button id="viewFitBtn" title="Fit video to screen (F)">Fit</button>
          <button id="resetViewBtn" title="Reset video view">Default</button>

          <span class="spacer"></span>

          <label class="vol">
            Volume <input id="volume" type="range" min="0" max="1" step="0.01" value="1" />
          </label>
        </div>

        <div class="legend">
          <span><i class="sw sw-decoded"></i>Decoded step cache</span>
          <span><i class="sw sw-decoding"></i>Decoding</span>
          <span><i class="sw sw-inout"></i>In / Out</span>
          <span><i class="sw sw-playhead"></i>Playhead</span>
        </div>

        <button id="closeUiBtn" class="collapse-ui-btn" title="Hide controls" aria-label="Hide controls">▼</button>
      </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
